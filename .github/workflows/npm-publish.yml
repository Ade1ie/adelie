name: Publish to npm on merge to main

on:
  push:
    branches:
      - main

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compare package.json version
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" || echo "none")
          echo "Current version: $CURRENT"
          echo "Previous version: $PREV"
          if [ "$CURRENT" != "$PREV" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT" >> $GITHUB_OUTPUT
          fi

  publish:
    name: Publish adelie-ai@${{ needs.check-version.outputs.new_version }}
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    permissions:
      contents: write   # Required to create GitHub Releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: "🐧 Adelie v${{ needs.check-version.outputs.new_version }}"
          body: |
            ## 🐧 Adelie v${{ needs.check-version.outputs.new_version }}

            Published to npm: `adelie-ai@${{ needs.check-version.outputs.new_version }}`

            **Update:**
            ```bash
            adelie --update
            # or
            npm install -g adelie-ai@latest
            ```

            See [CHANGELOG.md](https://github.com/Ade1ie/adelie/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
